<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validar Credenciales</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module" src="/javascript/loginPrueba.mjs"></script>
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Validar Credenciales</h1>
            <a href="index.html" class="btn_home"><i class="fa-solid fa-home"></i></a>
        </div>
    </header>
    <main>
        <div class="validar-credenciales">
            <h2>Validar Credenciales</h2>
            <form id="loginForm">
                <label id="usernameLabel" for="username">Usuario:</label>
                <input type="text" id="username" name="username" class="contenedoresLabel" required><br><br>
                
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" class="contenedoresLabel" required><br><br>
                
                <input id="iniciar-sesion" type="submit" value="Iniciar Sesión">
            </form>
        </div>
    </main>
</body>
</html>
