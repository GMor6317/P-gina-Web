<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas Particulares</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <header>
        <div class="header-container">
            <h1>Estadísticas Particulares</h1>
            <!--Menu de hamburgesa-->
            <div class="menu-btn" id="menuBtn">
                <div class="menu-btn__burger"></div>
            </div>

            <nav class="navbar" id="navbar">
                <ul>
                    <li><a href="estadisticasGenerales.html">Estadísticas Generales</a></li>
                    <li><a href="ranking.html">Ranking General</a></li>
                    <li><a href="index.html">Cerrar Sesión</a></li>

                </ul>
            </nav>
        </div>
    </header>
    <main>
        
        <div class="Graficas">
            <div class = "buscador">
            <input type="text" id="buscadorNombre" placeholder="Nombre">
            <input type="text" id="buscadorApellido" placeholder="Apellido">
            <button id="botonBuscar"><i class="fas fa-search"></i></button>
        </div>
            <div class="Grafica">
                <h2>Gráfica 1</h2>
                <canvas id="miGrafica"></canvas>
            </div>
            <div class="Grafica">
                <h2>Gráfica 2</h2>
                <canvas id="miGrafica2"></canvas>
            </div>
            <div class="Grafica">
                <h2>Gráfica 3</h2>
                <canvas id="miGrafica3"></canvas>
            </div>
            <!-- Nuevas Gráficas -->
             <div class="Grafica">
                <h2>Victorias Jugador</h2>
                <canvas id="graficaVictorias"></canvas>
            </div>
            <div class="Grafica">
                <h2>Duración vs Precisión</h2>
                <canvas id="graficaDuracionVSPrecision"></canvas>
            </div>
            <div class="Grafica">
                <h2>Habilidad Jugador</h2>
                <canvas id="graficaHabilidadJugador"></canvas>
            </div>
            <div class="Grafica">
                <h2>Habilidad Jugador</h2>
                <canvas id="graficaWinRate"></canvas>
            </div>
        </div>
    </main>
    <script type="module" src="./javascript/prueba.mjs"></script>
    <script type="module" src="./javascript/graficas.mjs"></script>
</body>

</html>
